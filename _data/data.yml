experiences:
    title: Experiences
    info:
      - role: VP, Business Solution & Reporting
        time: 2020 - Present
        company: CIMB THAI Bank PCL.
        details: |
          - Operations Management: Ensuring the reliability of ALM Data Mart and Regulatory Reporting systems with a focus on data integrity and compliance.
          - Project Delivery: Successfully delivered multiple Change Requests (CRs) and projects aligned with evolving business needs.
          - Process Improvement: Implemented automation initiatives to reduce manual effort and improve overall team productivity.
          - Collaboration: Partnered with IT and infrastructure teams to ensure seamless technical delivery and system stability.
      - role: AVP, Data Management
        time: 2018 - 2020
        company: CIMB THAI Bank PCL.
        details: |
          - Infrastructure Development: Developed and maintained data mart infrastructure by organizing complex data across various bank systems.
          - Project Support: Provided technical guidance for analytical projects in Consumer Banking and Risk Management.
          - Mentorship: Shared technical knowledge and supported the development of the MIS team.
      - role: AVP, Analytics Support
        time: 2015 - 2018
        company: United Overseas Bank (Thai) PCL.
        details: |
          - Data Mart Maintenance: Managed the Retail Data Mart infrastructure and supported portfolio management through data enhancement.
          - Automation: Consolidated SAS programs to automate data processing, improving execution speed for marketing campaigns.
          - Decision Support: Provided ad-hoc data analysis and inquiry support to facilitate business decision-making.
      - role: Services Delivery Manager
        time: 2011 - 2015
        company: Oracle Corporation (Thailand)
        details: |
          - Single Point of Contact for the post sales support management.
          - Share Oracle's best practices and provide proactive and reactive situation management to help maximize the value of customer's investment in Oracle Products
          - Plan and coordinate the delivery of Advanced Customer Services Program with Customer and Oracle's Service Delivery Engineer.
      - role: Technical Consultant (Data Management) | Sales Consultant
        time: (2003-2008)
        company: Role: Early Career Foundation
        details: |
          - Data Warehouse Implementation: Developed foundational expertise in the full lifecycle of Data Warehouse projects, from design and development to testing using SAS BI solutions.
          - Solution Design & Pre-sales: Supported project acquisition by assessing customer requirements, creating Proof of Concepts (PoC), and managing technical responses for RFIs/RFPs.
          - Client Engagement: Built strong professional relationships by aligning technical software solutions with business needs.

